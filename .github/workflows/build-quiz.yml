name: 📊 テスト記録 → ダッシュボード更新

on:
  repository_dispatch:
    types: [new_record]   # Make.com からのトリガー
  workflow_dispatch:       # 手動実行用

permissions:
  contents: write

jobs:
  process-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ チェックアウト
        uses: actions/checkout@v4

      - name: 🐍 Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📝 テスト記録を追記
        if: github.event_name == 'repository_dispatch'
        env:
          RECORD: ${{ toJson(github.event.client_payload) }}
        run: python scripts/append_record.py

      - name: 🔨 ダッシュボード HTML を生成
        run: |
          echo "=== records.json 内容確認 ==="
          cat data/records.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'レコード数: {len(d)}')"
          echo "=== ダッシュボード生成 ==="
          python -u scripts/generate_quiz_dashboard.py
          echo "=== 生成ファイル確認 ==="
          ls -la quiz.html || echo "⚠️ quiz.html が見つかりません"

      - name: 💾 コミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/records.json
          if [ -f quiz.html ]; then
            git add quiz.html
          else
            echo "⚠️ quiz.html が存在しないためスキップ"
          fi
          git diff --staged --quiet || git commit -m "📝 テスト記録追加 & ダッシュボード更新 [$(date +'%Y-%m-%d %H:%M JST')]"
          git push
