name: 📊 quiz.html 再生成（手動）

# Option B（2026-07-20 SoT一本化）で退役:
#   records.json は now ローカル sr-record.py が唯一の writer（原子 commit+push）。
#   Make.com → repository_dispatch(new_record) → append_record.py による
#   サーバ側 records.json 追記は「第2 writer」となり dual-writer / 日次 pull 衝突の
#   原因だったため、repository_dispatch トリガーと append_record 追記ステップを撤去。
#   本 workflow は quiz.html の手動再生成のみを担い、records.json は読むだけで commit しない。
on:
  workflow_dispatch:       # 手動実行のみ（repository_dispatch: new_record は退役）

permissions:
  contents: write

jobs:
  process-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ チェックアウト
        uses: actions/checkout@v4

      - name: 🐍 Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔨 ダッシュボード HTML を生成
        env:
          TZ: Asia/Tokyo
        run: |
          echo "=== records.json 内容確認 ==="
          cat data/records.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'レコード数: {len(d)}')"
          echo "=== ダッシュボード生成 ==="
          python -u scripts/generate_quiz_dashboard.py
          echo "=== 生成ファイル確認 ==="
          ls -la quiz.html || echo "⚠️ quiz.html が見つかりません"

      - name: 💾 コミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Option B: records.json は commit しない（ローカル sr-record.py が唯一の writer）
          git add index.html quiz.html
          git diff --staged --quiet || git commit -m "📊 quiz.html 再生成 [$(date +'%Y-%m-%d %H:%M JST')]"
          git push
