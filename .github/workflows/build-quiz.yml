name: 📊 テスト記録 → ダッシュボード更新

on:
  repository_dispatch:
    types: [new_record]   # Make.com からのトリガー
  workflow_dispatch:       # 手動実行用

permissions:
  contents: write

jobs:
  process-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ チェックアウト
        uses: actions/checkout@v4

      - name: 🐍 Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📝 テスト記録を追記
        if: github.event_name == 'repository_dispatch'
        env:
          RECORD: ${{ toJson(github.event.client_payload) }}
        run: python scripts/append_record.py

      - name: 🔨 ダッシュボード HTML を生成
        run: python scripts/generate_quiz_dashboard.py

      - name: 💾 コミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/records.json quiz.html
          git diff --staged --quiet || git commit -m "📝 テスト記録追加 & ダッシュボード更新 [$(date +'%Y-%m-%d %H:%M JST')]"
          git push
